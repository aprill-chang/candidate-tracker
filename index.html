<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Candidate Tracker</title>
  <link rel="stylesheet" href="candidate-tracker.css">
</head>
<body class="candidate-tracker-page">
  <div class="ct-wrap">
    <header class="ct-header">
      <h1 class="ct-title">Candidate Tracker</h1>
      <div class="ct-meta" id="ct-meta" aria-live="polite"></div>
      <button type="button" class="ct-refresh" id="ct-refresh" aria-label="Refresh from Ashby">Refresh</button>
    </header>

    <div id="ct-loading" class="ct-loading" hidden>Loading report…</div>
    <div id="ct-error" class="ct-error" hidden></div>
    <p id="ct-column-hint" class="ct-column-hint" hidden aria-live="polite"></p>
    <div id="ct-filters" class="ct-filters" hidden>
      <p class="ct-filter-hint">Select one or more options per filter. Empty = show all.</p>
      <div class="ct-filter-dropdown-wrap">
        <span class="ct-filter-label">Job</span>
        <div class="ct-dropdown" id="ct-dropdown-job">
          <button type="button" class="ct-dropdown-trigger" id="ct-trigger-job" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter by job">All jobs</button>
          <div class="ct-dropdown-panel" id="ct-panel-job" role="listbox" aria-label="Job options" hidden></div>
        </div>
      </div>
      <div class="ct-filter-dropdown-wrap">
        <span class="ct-filter-label">Stage</span>
        <div class="ct-dropdown" id="ct-dropdown-stage">
          <button type="button" class="ct-dropdown-trigger" id="ct-trigger-stage" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter by stage">All stages</button>
          <div class="ct-dropdown-panel" id="ct-panel-stage" role="listbox" aria-label="Stage options" hidden></div>
        </div>
      </div>
      <div class="ct-filter-dropdown-wrap">
        <span class="ct-filter-label">Status</span>
        <div class="ct-dropdown" id="ct-dropdown-status">
          <button type="button" class="ct-dropdown-trigger" id="ct-trigger-status" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter by status">All statuses</button>
          <div class="ct-dropdown-panel" id="ct-panel-status" role="listbox" aria-label="Status options" hidden></div>
        </div>
      </div>
      <div class="ct-filter-dropdown-wrap">
        <span class="ct-filter-label">Source</span>
        <div class="ct-dropdown" id="ct-dropdown-source">
          <button type="button" class="ct-dropdown-trigger" id="ct-trigger-source" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter by source">All sources</button>
          <div class="ct-dropdown-panel" id="ct-panel-source" role="listbox" aria-label="Source options" hidden></div>
        </div>
      </div>
    </div>
    <div class="ct-table-wrap" id="ct-table-wrap" hidden>
      <table class="ct-table" id="ct-table" role="grid">
        <thead>
          <tr>
            <th scope="col" class="ct-sortable" data-sort="name" id="ct-th-name">Candidate name <span class="ct-sort-icon" aria-hidden="true"></span></th>
            <th scope="col" class="ct-sortable" data-sort="job" id="ct-th-job">Candidate job <span class="ct-sort-icon" aria-hidden="true"></span></th>
            <th scope="col" class="ct-sortable" data-sort="stage" id="ct-th-stage">Current interview stage <span class="ct-sort-icon" aria-hidden="true"></span></th>
            <th scope="col" class="ct-sortable" data-sort="status" id="ct-th-status">Status <span class="ct-sort-icon" aria-hidden="true"></span></th>
            <th scope="col" class="ct-sortable" data-sort="statusDate" id="ct-th-statusDate">Status date <span class="ct-sort-icon" aria-hidden="true"></span></th>
            <th scope="col" class="ct-sortable" data-sort="source" id="ct-th-source">Source <span class="ct-sort-icon" aria-hidden="true"></span></th>
            <th scope="col">Note</th>
          </tr>
        </thead>
        <tbody id="ct-tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var LOCALSTORAGE_PREFIX = 'candidate-tracker-note-';

  var possibleNames = ['candidate', 'name', 'full name', 'candidate name'];
  var possibleJobs = ['job', 'opening', 'position', 'role', 'title', 'job title'];
  var possibleStages = ['stage', 'interview stage', 'current stage', 'current interview stage', 'furthest stage group reached'];
  var possibleStatus = ['status', 'application status', 'stage', 'state'];
  var possibleStatusDate = ['activity status due at', 'status date', 'status changed', 'interview date', 'next interview date', 'next interview', 'scheduled date', 'scheduled at', 'scheduled for', 'interview scheduled', 'scheduled', 'current interview date', 'upcoming interview', 'last updated', 'updated at', 'updated', 'stage change date', 'stage changed', 'last activity', 'date scheduled', 'date'];
  var possibleSource = ['source', 'credited to', 'referral', 'sourcing source'];
  var possibleIds = ['ashby candidate id', 'candidate id', 'id', 'candidateId', 'candidate_id'];
  var possibleApplicationIds = ['ashby job id', 'application id', 'job application id', 'ashby application id', 'applicationId', 'application_id', 'consideration id'];
  var ASHBY_PEOPLE_BASE = 'https://app.ashbyhq.com/people/';
  var ASHBY_CANDIDATE_FEED_BASE = 'https://app.ashbyhq.com/home/upcoming/right-side/candidates/';

  function findColumnIndex(columnNames, possible, excludeIndices) {
    var exclude = excludeIndices || [];
    var lower = columnNames.map(function (c) { return (c || '').toLowerCase().trim().replace(/\s+/g, ' '); });
    for (var i = 0; i < possible.length; i++) {
      var p = (possible[i] || '').toLowerCase().trim().replace(/\s+/g, ' ');
      for (var j = 0; j < lower.length; j++) {
        if (exclude.indexOf(j) !== -1) continue;
        if (lower[j].indexOf(p) !== -1 || p.indexOf(lower[j]) !== -1) return j;
      }
    }
    return -1;
  }

  function findAshbyCandidateIdColumn(columnNames, excludeIndices) {
    var exclude = excludeIndices || [];
    for (var j = 0; j < columnNames.length; j++) {
      if (exclude.indexOf(j) !== -1) continue;
      var lower = (columnNames[j] || '').toLowerCase().trim().replace(/\s+/g, ' ');
      if (lower.indexOf('ashby') !== -1 && lower.indexOf('candidate') !== -1 && lower.indexOf('id') !== -1) return j;
    }
    return -1;
  }

  function findApplicationIdColumn(columnNames, excludeIndices) {
    var exclude = excludeIndices || [];
    for (var j = 0; j < columnNames.length; j++) {
      if (exclude.indexOf(j) !== -1) continue;
      var lower = (columnNames[j] || '').toLowerCase().trim().replace(/\s+/g, ' ');
      if ((lower.indexOf('ashby') !== -1 && lower.indexOf('job') !== -1 && lower.indexOf('id') !== -1) ||
          (lower.indexOf('application') !== -1 && lower.indexOf('id') !== -1)) return j;
    }
    return -1;
  }

  function findFirstDateLikeColumn(columnNames, excludeIndices) {
    var exclude = excludeIndices || [];
    var dateLike = ['date', 'scheduled', 'time', 'updated', 'changed', 'at'];
    for (var j = 0; j < columnNames.length; j++) {
      if (exclude.indexOf(j) !== -1) continue;
      var lower = (columnNames[j] || '').toLowerCase();
      for (var d = 0; d < dateLike.length; d++) {
        if (lower.indexOf(dateLike[d]) !== -1) return j;
      }
    }
    return -1;
  }

  function buildRowId(row, indices, columnNames, rowIndex) {
    var idCol = -1;
    var lower = columnNames.map(function (c) { return (c || '').toLowerCase().trim(); });
    if (lower.indexOf('id') !== -1) idCol = lower.indexOf('id');
    else if (lower.indexOf('candidate id') !== -1) idCol = lower.indexOf('candidate id');
    if (idCol >= 0) {
      var idVal = cellValue(row, idCol, columnNames);
      if (idVal) return String(idVal).trim();
    }
    var name = indices.name >= 0 ? String(cellValue(row, indices.name, columnNames) || '').trim() : '';
    var job = indices.job >= 0 ? String(cellValue(row, indices.job, columnNames) || '').trim() : '';
    return (name + '|' + job) || 'row-' + rowIndex;
  }

  function formatDate(val) {
    if (val == null || val === '') return null;
    var s = String(val).trim();
    if (!s) return null;
    var d = new Date(s);
    if (isNaN(d.getTime())) return null;
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function displayDate(val) {
    var formatted = formatDate(val);
    return formatted ? formatted : 'Scheduling';
  }

  function getStoredNote(rowId) {
    try {
      return localStorage.getItem(LOCALSTORAGE_PREFIX + rowId) || '';
    } catch (e) {
      return '';
    }
  }

  function setStoredNote(rowId, text) {
    try {
      localStorage.setItem(LOCALSTORAGE_PREFIX + rowId, text);
    } catch (e) {}
  }

  function escapeText(str) {
    return String(str == null ? '' : str).trim();
  }

  function cellValue(row, colIndex, columnNames) {
    if (colIndex < 0) return '';
    if (Array.isArray(row)) return row[colIndex];
    var key = columnNames[colIndex];
    if (key != null && row[key] !== undefined && row[key] !== '') return row[key];
    if (row && typeof row === 'object' && key) {
      var keyLower = String(key).toLowerCase().trim();
      for (var k in row) {
        if (Object.prototype.hasOwnProperty.call(row, k) && (k || '').toLowerCase().trim() === keyLower) return row[k];
      }
    }
    return '';
  }

  function getCandidateId(row, columnNames, indices) {
    if (indices.id >= 0) {
      var val = String(cellValue(row, indices.id, columnNames) || '').trim();
      if (val) return val;
    }
    if (row && typeof row === 'object' && !Array.isArray(row)) {
      var target = 'ashby candidate id';
      var targetNoSpaces = target.replace(/\s+/g, '');
      for (var k in row) {
        if (!Object.prototype.hasOwnProperty.call(row, k)) continue;
        var keyLower = (k || '').toLowerCase().trim();
        var keyNoSpaces = keyLower.replace(/\s+/g, '');
        if (keyLower === target || keyNoSpaces === targetNoSpaces) {
          var v = row[k];
          if (v != null && v !== '') return String(v).trim();
        }
      }
      for (var k2 in row) {
        if (Object.prototype.hasOwnProperty.call(row, k2)) {
          var lower = (k2 || '').toLowerCase().trim();
          if (lower.indexOf('ashby') !== -1 && lower.indexOf('candidate') !== -1 && lower.indexOf('id') !== -1) {
            var v2 = row[k2];
            if (v2 != null && v2 !== '') return String(v2).trim();
          }
        }
      }
    }
    return '';
  }

  function getApplicationId(row, columnNames, indices) {
    if (indices.applicationId >= 0) {
      var val = String(cellValue(row, indices.applicationId, columnNames) || '').trim();
      if (val) return val;
    }
    if (row && typeof row === 'object' && !Array.isArray(row)) {
      var targetVariants = ['ashby job id', 'application id', 'job application id', 'ashby application id', 'applicationid'];
      for (var k in row) {
        if (!Object.prototype.hasOwnProperty.call(row, k)) continue;
        var keyLower = (k || '').toLowerCase().trim().replace(/\s+/g, ' ');
        var keyNoSpaces = keyLower.replace(/\s+/g, '');
        for (var t = 0; t < targetVariants.length; t++) {
          if (keyLower.indexOf(targetVariants[t]) !== -1 || keyNoSpaces.indexOf(targetVariants[t].replace(/\s/g, '')) !== -1) {
            var v = row[k];
            if (v != null && v !== '') return String(v).trim();
          }
        }
      }
    }
    return '';
  }

  function hashToIndex(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i) | 0;
    return h < 0 ? -h : h;
  }

  function stageEmoji(stage) {
    var s = (stage || '').toLowerCase();
    if (/intro|phone|screen/.test(s)) return '👋';
    if (/first|1st|round 1/.test(s)) return '1️⃣';
    if (/second|2nd|round 2/.test(s)) return '2️⃣';
    if (/onsite|on-site|final/.test(s)) return '🏢';
    if (/reference/.test(s)) return '📝';
    if (/offer/.test(s)) return '📋';
    if (/hired/.test(s)) return '✅';
    if (/reject|archive|withdraw/.test(s)) return '❌';
    return '📍';
  }

  function statusEmoji(status) {
    var s = (status || '').toLowerCase();
    if (/archived/.test(s)) return '📦';
    if (/waiting on feedback|feedback/.test(s)) return '⏳';
    if (/needs scheduling|scheduling/.test(s)) return '📅';
    if (/waiting on submission|submission/.test(s)) return '📄';
    if (/needs decision|decision/.test(s)) return '🤔';
    if (/active|in progress/.test(s)) return '🔄';
    if (/offer|pending offer/.test(s)) return '📋';
    if (/hired|closed/.test(s)) return '✅';
    return '•';
  }

  var fullColumnNames = [];
  var fullData = [];
  var fullIndices = null;
  var fullJobToIndex = {};
  var uniqueJobs = [];
  var uniqueStages = [];
  var uniqueStatuses = [];
  var uniqueSources = [];
  var sortBy = '';
  var sortDir = 1;

  function renderTable(columnNames, data, debug, response, jobToIndexOverride) {
    var tbody = document.getElementById('ct-tbody');
    var wrap = document.getElementById('ct-table-wrap');
    tbody.textContent = '';

    if (!columnNames.length || !data.length) {
      wrap.hidden = false;
      if (fullData.length > 0) {
        /* No candidates match filters: show blank (empty body) */
      } else {
        var emptyRow = document.createElement('tr');
        var emptyCell = document.createElement('td');
        emptyCell.colSpan = 7;
        emptyCell.className = 'ct-empty-message';
        emptyCell.textContent = 'No candidate rows in the report. Check that your Ashby report has data and that filters are saved.';
        emptyRow.appendChild(emptyCell);
        tbody.appendChild(emptyRow);
      }
      return;
    }

    var indices = fullIndices || (function () {
      var i = {};
      i.name = findColumnIndex(columnNames, possibleNames);
      i.job = findColumnIndex(columnNames, possibleJobs, [i.name]);
      i.stage = findColumnIndex(columnNames, possibleStages, [i.name, i.job]);
      i.status = findColumnIndex(columnNames, possibleStatus, [i.name, i.job, i.stage]);
      i.statusDate = findColumnIndex(columnNames, possibleStatusDate, [i.name, i.job, i.stage, i.status]);
      if (i.statusDate < 0) i.statusDate = findFirstDateLikeColumn(columnNames, [i.name, i.job, i.stage, i.status]);
      i.source = findColumnIndex(columnNames, possibleSource, [i.name, i.job, i.stage, i.status, i.statusDate]);
      i.id = findColumnIndex(columnNames, possibleIds, [i.name, i.job, i.stage, i.status, i.statusDate, i.source]);
      if (i.id < 0) i.id = findAshbyCandidateIdColumn(columnNames, [i.name, i.job, i.stage, i.status, i.statusDate, i.source]);
      i.applicationId = findColumnIndex(columnNames, possibleApplicationIds, [i.name, i.job, i.stage, i.status, i.statusDate, i.source, i.id]);
      if (i.applicationId < 0) i.applicationId = findApplicationIdColumn(columnNames, [i.name, i.job, i.stage, i.status, i.statusDate, i.source, i.id]);
      return i;
    })();
    var rows = data;
    var jobToIndex = jobToIndexOverride || (function () {
      var map = {};
      var idx = 0;
      for (var r = 0; r < rows.length; r++) {
        var j = escapeText(cellValue(rows[r], indices.job, columnNames)) || '—';
        if (map[j] === undefined) map[j] = idx++;
      }
      return map;
    })();

    for (var r = 0; r < rows.length; r++) {
      var row = rows[r];
      var rowId = buildRowId(row, indices, columnNames, r);
      var nameVal = cellValue(row, indices.name, columnNames);
      var jobVal = cellValue(row, indices.job, columnNames);
      var stageVal = cellValue(row, indices.stage, columnNames);
      var noteVal = getStoredNote(rowId);

      var tr = document.createElement('tr');

      var tdName = document.createElement('td');
      var candidateId = getCandidateId(row, columnNames, indices);
      var applicationId = getApplicationId(row, columnNames, indices);
      var nameDisplay = escapeText(nameVal) || '—';
      if (candidateId) {
        var link = document.createElement('a');
        if (applicationId) {
          link.href = ASHBY_CANDIDATE_FEED_BASE + encodeURIComponent(candidateId) + '/applications/' + encodeURIComponent(applicationId) + '/feed';
        } else {
          link.href = ASHBY_PEOPLE_BASE + encodeURIComponent(candidateId);
        }
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = nameDisplay;
        link.className = 'ct-name-link';
        tdName.appendChild(link);
      } else {
        tdName.textContent = nameDisplay;
      }
      tr.appendChild(tdName);

      var tdJob = document.createElement('td');
      tdJob.className = 'ct-tag ct-job-' + (jobToIndex[escapeText(jobVal) || '—'] % 16);
      tdJob.textContent = escapeText(jobVal) || '—';
      tr.appendChild(tdJob);

      var stageText = escapeText(stageVal) || '—';
      var tdStage = document.createElement('td');
      tdStage.textContent = stageEmoji(stageVal) + ' ' + stageText;
      tr.appendChild(tdStage);

      var statusVal = cellValue(row, indices.status, columnNames);
      var statusDateVal = cellValue(row, indices.statusDate, columnNames);
      var sourceVal = cellValue(row, indices.source, columnNames);
      var statusKey = escapeText(statusVal) || '—';
      var tdStatus = document.createElement('td');
      tdStatus.textContent = statusEmoji(statusVal) + ' ' + statusKey;
      tr.appendChild(tdStatus);
      var tdStatusDate = document.createElement('td');
      var statusDateFormatted = formatDate(statusDateVal);
      tdStatusDate.textContent = statusDateFormatted ? statusDateFormatted : (escapeText(statusDateVal) || '—');
      tr.appendChild(tdStatusDate);
      var tdSource = document.createElement('td');
      tdSource.textContent = escapeText(sourceVal) || '—';
      tr.appendChild(tdSource);

      var tdNote = document.createElement('td');
      tdNote.className = 'ct-note-cell';
      var input = document.createElement('textarea');
      input.className = 'ct-note-input';
      input.rows = 2;
      input.setAttribute('aria-label', 'Note for ' + escapeText(nameVal));
      input.value = noteVal;
      input.addEventListener('change', function (ev) {
        setStoredNote(rowId, ev.target.value);
      });
      input.addEventListener('input', function (ev) {
        setStoredNote(rowId, ev.target.value);
      });
      tdNote.appendChild(input);
      tr.appendChild(tdNote);

      tbody.appendChild(tr);
    }

    wrap.hidden = false;
  }

  function setMeta(text) {
    var el = document.getElementById('ct-meta');
    if (el) el.textContent = text;
  }

  function getVal(row, key, columnNames, indices) {
    var col = indices[key];
    return col >= 0 ? cellValue(row, col, columnNames) : '';
  }

  function getDisplayVal(row, key, columnNames, indices) {
    return escapeText(getVal(row, key, columnNames, indices)) || '—';
  }

  function populateFilterOptions() {
    function fillPanel(panelId, options) {
      var panel = document.getElementById(panelId);
      if (!panel) return;
      panel.textContent = '';
      options.forEach(function (opt) {
        var label = document.createElement('label');
        label.className = 'ct-dropdown-option';
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = opt;
        cb.setAttribute('data-value', opt);
        label.appendChild(cb);
        label.appendChild(document.createTextNode(opt));
        panel.appendChild(label);
      });
    }
    fillPanel('ct-panel-job', uniqueJobs);
    fillPanel('ct-panel-stage', uniqueStages);
    fillPanel('ct-panel-status', uniqueStatuses);
    fillPanel('ct-panel-source', uniqueSources);
  }

  function getFilterValues() {
    function selectedFromPanel(panelId) {
      var panel = document.getElementById(panelId);
      if (!panel) return [];
      var boxes = panel.querySelectorAll('input[type="checkbox"]:checked');
      var out = [];
      for (var i = 0; i < boxes.length; i++) out.push(boxes[i].value);
      return out;
    }
    return {
      job: selectedFromPanel('ct-panel-job'),
      stage: selectedFromPanel('ct-panel-stage'),
      status: selectedFromPanel('ct-panel-status'),
      source: selectedFromPanel('ct-panel-source')
    };
  }

  function updateDropdownLabels() {
    var f = getFilterValues();
    function label(count, allLabel, triggerId) {
      if (count === 0) return allLabel;
      return count + ' selected';
    }
    var tJob = document.getElementById('ct-trigger-job');
    var tStage = document.getElementById('ct-trigger-stage');
    var tStatus = document.getElementById('ct-trigger-status');
    var tSource = document.getElementById('ct-trigger-source');
    if (tJob) tJob.textContent = label(f.job.length, 'All jobs', 'ct-trigger-job');
    if (tStage) tStage.textContent = label(f.stage.length, 'All stages', 'ct-trigger-stage');
    if (tStatus) tStatus.textContent = label(f.status.length, 'All statuses', 'ct-trigger-status');
    if (tSource) tSource.textContent = label(f.source.length, 'All sources', 'ct-trigger-source');
  }

  function closeAllDropdowns() {
    ['job', 'stage', 'status', 'source'].forEach(function (key) {
      var panel = document.getElementById('ct-panel-' + key);
      var trigger = document.getElementById('ct-trigger-' + key);
      if (panel) { panel.hidden = true; }
      if (trigger) { trigger.setAttribute('aria-expanded', 'false'); }
    });
  }

  function setupDropdown(key, raw) {
    var trigger = document.getElementById('ct-trigger-' + key);
    var panel = document.getElementById('ct-panel-' + key);
    if (!trigger || !panel) return;
    trigger.addEventListener('click', function (e) {
      e.stopPropagation();
      var isOpen = !panel.hidden;
      closeAllDropdowns();
      if (!isOpen) {
        panel.hidden = false;
        trigger.setAttribute('aria-expanded', 'true');
      }
    });
    panel.addEventListener('change', function () {
      updateDropdownLabels();
      applyFilterAndSort(raw);
    });
    panel.addEventListener('click', function (e) {
      e.stopPropagation();
    });
  }

  function applyFilterAndSort(lastRaw) {
    var f = getFilterValues();
    var filtered = fullData.filter(function (row) {
      var job = getDisplayVal(row, 'job', fullColumnNames, fullIndices);
      var stage = getDisplayVal(row, 'stage', fullColumnNames, fullIndices);
      var status = getDisplayVal(row, 'status', fullColumnNames, fullIndices);
      var source = getDisplayVal(row, 'source', fullColumnNames, fullIndices);
      if (f.job.length > 0 && f.job.indexOf(job) === -1) return false;
      if (f.stage.length > 0 && f.stage.indexOf(stage) === -1) return false;
      if (f.status.length > 0 && f.status.indexOf(status) === -1) return false;
      if (f.source.length > 0 && f.source.indexOf(source) === -1) return false;
      return true;
    });
    if (sortBy) {
      var key = sortBy;
      var mult = sortDir;
      filtered.sort(function (a, b) {
        var va = getVal(a, key, fullColumnNames, fullIndices);
        var vb = getVal(b, key, fullColumnNames, fullIndices);
        if (key === 'statusDate') {
          var da = formatDate(va);
          var db = formatDate(vb);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return mult * (new Date(va) - new Date(vb));
        }
        var sa = String(va || '').toLowerCase();
        var sb = String(vb || '').toLowerCase();
        if (sa < sb) return -mult;
        if (sa > sb) return mult;
        return 0;
      });
    }
    renderTable(fullColumnNames, filtered, lastRaw && lastRaw._debug, lastRaw, fullJobToIndex);
    updateDropdownLabels();
    var metaEl = document.getElementById('ct-meta');
    if (metaEl) metaEl.textContent = (metaEl.getAttribute('data-sync-text') || '') + (filtered.length !== fullData.length ? ' · Showing ' + filtered.length + ' of ' + fullData.length : '');
    var icons = document.querySelectorAll('.ct-sort-icon');
    for (var i = 0; i < icons.length; i++) icons[i].textContent = '';
    var th = sortBy && document.getElementById('ct-th-' + sortBy);
    if (th) {
      var icon = th.querySelector('.ct-sort-icon');
      if (icon) icon.textContent = sortDir === 1 ? ' ↑' : ' ↓';
    }
  }

  function setLoading(show) {
    document.getElementById('ct-loading').hidden = !show;
  }

  function setError(msg) {
    var el = document.getElementById('ct-error');
    el.hidden = !msg;
    if (msg) el.textContent = msg;
  }

  function hideTable() {
    document.getElementById('ct-table-wrap').hidden = true;
  }

  function fetchReport() {
    setLoading(true);
    setError('');
    hideTable();
    setMeta('');

    fetch('/api/ashby-report')
      .then(function (res) {
        return res.json().then(function (data) {
          return { ok: res.ok, status: res.status, data: data };
        });
      })
      .then(function (result) {
        setLoading(false);
        if (!result.ok) {
          var msg = (result.data && result.data.error) ? result.data.error : 'Failed to load report';
          if (result.data && result.data.details && result.data.details.message) {
            msg += ': ' + result.data.details.message;
          }
          setError(msg);
          return;
        }
        var raw = result.data;
        var resolved = raw.results && typeof raw.results === 'object' ? raw.results : raw;
        var columnNames = resolved.columnNames || resolved.columnNamesList || raw.columnNames || raw.columnNamesList || [];
        var data = resolved.data || resolved.rows || raw.data || raw.rows || [];
        if (Array.isArray(data[0]) && data[0].length && !columnNames.length && typeof data[0][0] === 'string') {
          columnNames = data[0];
          data = data.slice(1);
        }
        var firstRow = data[0];
        var isFirstRowHeader = firstRow && columnNames.length === firstRow.length &&
          columnNames.every(function (h, i) { return String((Array.isArray(firstRow) ? firstRow[i] : firstRow[h]) || '').trim() === String(h || '').trim(); });
        var rows = isFirstRowHeader ? data.slice(1) : data;

        fullColumnNames = columnNames;
        fullData = rows;
        fullIndices = (function () {
          var i = {};
          i.name = findColumnIndex(columnNames, possibleNames);
          i.job = findColumnIndex(columnNames, possibleJobs, [i.name]);
          i.stage = findColumnIndex(columnNames, possibleStages, [i.name, i.job]);
          i.status = findColumnIndex(columnNames, possibleStatus, [i.name, i.job, i.stage]);
          i.statusDate = findColumnIndex(columnNames, possibleStatusDate, [i.name, i.job, i.stage, i.status]);
          if (i.statusDate < 0) i.statusDate = findFirstDateLikeColumn(columnNames, [i.name, i.job, i.stage, i.status]);
          i.source = findColumnIndex(columnNames, possibleSource, [i.name, i.job, i.stage, i.status, i.statusDate]);
          i.id = findColumnIndex(columnNames, possibleIds, [i.name, i.job, i.stage, i.status, i.statusDate, i.source]);
          if (i.id < 0) i.id = findAshbyCandidateIdColumn(columnNames, [i.name, i.job, i.stage, i.status, i.statusDate, i.source]);
          i.applicationId = findColumnIndex(columnNames, possibleApplicationIds, [i.name, i.job, i.stage, i.status, i.statusDate, i.source, i.id]);
          if (i.applicationId < 0) i.applicationId = findApplicationIdColumn(columnNames, [i.name, i.job, i.stage, i.status, i.statusDate, i.source, i.id]);
          return i;
        })();
        fullJobToIndex = {};
        var jobIdx = 0;
        for (var r = 0; r < rows.length; r++) {
          var j = getDisplayVal(rows[r], 'job', columnNames, fullIndices);
          if (fullJobToIndex[j] === undefined) fullJobToIndex[j] = jobIdx++;
        }
        var jobSet = {};
        var stageSet = {};
        var statusSet = {};
        var sourceSet = {};
        for (var r = 0; r < rows.length; r++) {
          jobSet[getDisplayVal(rows[r], 'job', columnNames, fullIndices)] = true;
          stageSet[getDisplayVal(rows[r], 'stage', columnNames, fullIndices)] = true;
          statusSet[getDisplayVal(rows[r], 'status', columnNames, fullIndices)] = true;
          sourceSet[getDisplayVal(rows[r], 'source', columnNames, fullIndices)] = true;
        }
        uniqueJobs = Object.keys(jobSet).filter(Boolean).sort();
        uniqueStages = Object.keys(stageSet).filter(Boolean).sort();
        uniqueStatuses = Object.keys(statusSet).filter(Boolean).sort();
        uniqueSources = Object.keys(sourceSet).filter(Boolean).sort();

        var syncText = 'Last synced ' + new Date().toLocaleString() + ' · ' + rows.length + ' row(s)';
        setMeta(syncText);
        var metaEl = document.getElementById('ct-meta');
        if (metaEl) metaEl.setAttribute('data-sync-text', syncText + ' ');

        var hintEl = document.getElementById('ct-column-hint');
        if (hintEl && columnNames.length) {
          hintEl.hidden = false;
          var idColName = fullIndices.id >= 0 ? columnNames[fullIndices.id] : 'none';
          var sampleId = rows.length ? getCandidateId(rows[0], columnNames, fullIndices) : '';
          var linkHint = ' Profile links: ' + (fullIndices.id >= 0 ? 'column "' + idColName + '"' : 'no ID column found') + (sampleId ? ', sample ID: ' + sampleId.substring(0, 8) + '…' : fullIndices.id >= 0 ? ' (first row empty)' : '');
          hintEl.textContent = 'Report columns: ' + columnNames.join(', ') + '. Status date maps to the first matching date column.' + linkHint;
        }

        var filtersEl = document.getElementById('ct-filters');
        if (filtersEl) {
          filtersEl.hidden = false;
          populateFilterOptions();
          ['job', 'stage', 'status', 'source'].forEach(function (k) { setupDropdown(k, raw); });
          document.addEventListener('click', closeAllDropdowns);
        }
        document.querySelectorAll('.ct-sortable').forEach(function (th) {
          th.addEventListener('click', function () {
            var key = th.getAttribute('data-sort');
            if (!key) return;
            if (sortBy === key) sortDir = -sortDir; else { sortBy = key; sortDir = 1; }
            applyFilterAndSort(raw);
          });
        });

        applyFilterAndSort(raw);
      })
      .catch(function (err) {
        setLoading(false);
        setError('Network error: ' + (err.message || 'Could not reach server'));
      });
  }

  document.getElementById('ct-refresh').addEventListener('click', fetchReport);
  fetchReport();
})();
  </script>
</body>
</html>
